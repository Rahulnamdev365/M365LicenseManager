name: Build and Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup PowerShell
      uses: actions/setup-powershell@v2

    - name: Install Pester
      shell: pwsh
      run: |
        Install-Module Pester -Force -Scope CurrentUser

    - name: Run Pester Tests
      shell: pwsh
      run: |
        Invoke-Pester ./Tests